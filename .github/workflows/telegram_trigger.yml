name: Telegram Remote Trigger

on:
  repository_dispatch:
    types: [telegram_run_command]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out files
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Execute Pipeline Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Save Updated Excel Tracker Back to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Manual Telegram Trigger: Appended New Daily Matches"

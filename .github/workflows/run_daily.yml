name: Daily Dubai Job Pipeline

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 6 * * *' 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out files
        uses: actions/checkout@v4 # Upgraded from v3

      - name: Setup Python environment
        uses: actions/setup-python@v5 # Upgraded from v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openpyxl

      - name: Execute Pipeline Engine
        env:
          LI_AT_COOKIE: ${{ secrets.LI_AT_COOKIE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Save Updated Excel Tracker Back to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5 # Upgraded from v4
        with:
          commit_message: "Automated Sheet Update: Appended New Daily Matches"
